name: habitarc
description: "Track daily habits, view streaks, and get reminders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Utils
  intl: ^0.20.2

  # SVG rendering
  flutter_svg: ^2.0.16

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ">=2.4.14 <2.6.0"
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/habitarc-icon.png"
  min_sdk_android: 21
